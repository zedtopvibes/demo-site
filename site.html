<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZedTopVibes | Latest Albums</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --skeleton: #334155;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Essential for preventing Layout Shift */
        .album-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 320px; /* Prevents container collapse */
        }

        .img-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1; /* Fixed ratio prevents jump */
            background-color: var(--skeleton);
        }

        .album-art {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .info {
            padding: 1rem;
        }

        .title {
            font-size: 1rem;
            font-weight: 700;
            margin: 0 0 0.25rem 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .artist {
            color: var(--text-dim);
            font-size: 0.875rem;
            margin: 0;
        }

        /* Skeleton Animation */
        .skeleton-pulse {
            animation: pulse 1.5s infinite ease-in-out;
            background-color: var(--skeleton);
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <header style="text-align: center; margin-bottom: 3rem;">
        <h1>Latest Albums</h1>
    </header>

    <div id="album-grid" class="grid">
        <div class="album-card"><div class="img-container skeleton-pulse"></div><div class="info"><div class="skeleton-pulse" style="height:1rem; width:80%; margin-bottom:8px"></div><div class="skeleton-pulse" style="height:0.8rem; width:50%"></div></div></div>
        <div class="album-card"><div class="img-container skeleton-pulse"></div><div class="info"><div class="skeleton-pulse" style="height:1rem; width:80%; margin-bottom:8px"></div><div class="skeleton-pulse" style="height:0.8rem; width:50%"></div></div></div>
        <div class="album-card"><div class="img-container skeleton-pulse"></div><div class="info"><div class="skeleton-pulse" style="height:1rem; width:80%; margin-bottom:8px"></div><div class="skeleton-pulse" style="height:0.8rem; width:50%"></div></div></div>
        <div class="album-card"><div class="img-container skeleton-pulse"></div><div class="info"><div class="skeleton-pulse" style="height:1rem; width:80%; margin-bottom:8px"></div><div class="skeleton-pulse" style="height:0.8rem; width:50%"></div></div></div>
    </div>

    <script>
        const API_URL = 'https://zedtopvibes.com/api/albums';
        const grid = document.getElementById('album-grid');

        async function loadAlbums() {
            try {
                const response = await fetch(API_URL);
                const albums = await response.json();
                
                // Clear skeletons
                grid.innerHTML = '';

                albums.forEach(album => {
                    const card = document.createElement('div');
                    card.className = 'album-card';
                    card.innerHTML = `
                        <div class="img-container">
                            <img class="album-art" 
                                 src="${album.cover_url}" 
                                 alt="${album.title}" 
                                 loading="lazy">
                        </div>
                        <div class="info">
                            <h3 class="title">${album.title}</h3>
                            <p class="artist">${album.artist || 'Unknown Artist'}</p>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (err) {
                grid.innerHTML = `<p>Failed to load albums. Please try again later.</p>`;
                console.error(err);
            }
        }

        loadAlbums();
    </script>
</body>
</html>
