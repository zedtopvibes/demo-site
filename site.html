<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZedTopVibes | Grid No Shift</title>

<style>
:root {
    --bg: #0f172a;
    --card: #1e293b;
    --text-main: #f8fafc;
    --text-dim: #94a3b8;
    --skeleton: #334155;
}

body {
    margin: 0;
    padding: 1rem;
    font-family: system-ui;
    background: var(--bg);
    color: var(--text-main);
}

.container {
    max-width: 900px;
    margin: auto;
}

/* GRID LAYOUT */
.album-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
}

/* CARD */
.album-card {
    background: var(--card);
    border-radius: 10px;
    overflow: hidden;

    /* KEY: lock full height */
    height: 220px;
    display: flex;
    flex-direction: column;
}

/* IMAGE */
.img-box {
    width: 100%;
    height: 140px; /* fixed */
    background: var(--skeleton);
    flex-shrink: 0;
}

.img-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* TEXT */
.info {
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.title {
    font-weight: 700;
    font-size: 0.9rem;

    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;

    height: 1.2em;
}

.artist {
    font-size: 0.8rem;
    color: var(--text-dim);

    height: 1.2em;
}

/* SKELETON */
.skeleton {
    animation: pulse 1.5s infinite ease-in-out;
    background: var(--skeleton);
}

@keyframes pulse {
    0%,100% { opacity:1; }
    50% { opacity:0.5; }
}
</style>
</head>

<body>

<div class="container">
    <div id="grid" class="album-grid">

        <!-- Skeleton Cards -->
        <div class="album-card">
            <div class="img-box skeleton"></div>
            <div class="info">
                <div class="title skeleton" style="width:80%"></div>
                <div class="artist skeleton" style="width:50%"></div>
            </div>
        </div>

        <div class="album-card">
            <div class="img-box skeleton"></div>
            <div class="info">
                <div class="title skeleton" style="width:80%"></div>
                <div class="artist skeleton" style="width:50%"></div>
            </div>
        </div>

        <div class="album-card">
            <div class="img-box skeleton"></div>
            <div class="info">
                <div class="title skeleton" style="width:80%"></div>
                <div class="artist skeleton" style="width:50%"></div>
            </div>
        </div>

    </div>
</div>

<script>
const API_URL = 'https://zedtopvibes.com/api/albums';
const grid = document.getElementById('grid');

async function load() {
    try {
        const res = await fetch(API_URL);
        const data = await res.json();

        let html = '';

        data.forEach(album => {
            html += `
            <div class="album-card">
                <div class="img-box">
                    <img src="${album.cover_url}" alt="${album.title}" loading="lazy">
                </div>
                <div class="info">
                    <div class="title">${album.title}</div>
                    <div class="artist">${album.artist || 'Unknown'}</div>
                </div>
            </div>`;
        });

        // ONE swap → no flicker, no shift
        grid.innerHTML = html;

    } catch (e) {
        console.error(e);
    }
}

load();
</script>

</body>
</html>
