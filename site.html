<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZedTopVibes | Music Explorer</title>
    <style>
        :root {
            --bg: #05070a;
            --card: #111827;
            --accent: #3b82f6;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --skeleton: #1f2937;
            --size: 80px; /* Our 80x80 constraint */
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            line-height: 1.5;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            padding: 2rem 0;
            border-bottom: 1px solid var(--skeleton);
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: clamp(1.5rem, 5vw, 2rem);
            margin: 0;
            background: linear-gradient(90deg, #fff, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* The Feed */
        .album-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Layout Shift Prevention: Fixed Height Card */
        .album-card {
            display: flex;
            align-items: center;
            background: var(--card);
            border-radius: 10px;
            padding: 8px;
            gap: 16px;
            text-decoration: none;
            color: inherit;
            height: 96px; /* (80px image) + (8px padding * 2) */
            transition: transform 0.2s ease, background 0.2s ease;
            border: 1px solid transparent;
        }

        .album-card:hover {
            background: #1d2433;
            border-color: var(--accent);
            transform: translateX(4px);
        }

        /* Fixed 80x80 container */
        .img-wrapper {
            width: var(--size);
            height: var(--size);
            flex-shrink: 0;
            border-radius: 6px;
            background-color: var(--skeleton);
            overflow: hidden;
            position: relative;
        }

        .img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .content {
            flex-grow: 1;
            min-width: 0; /* Critical for ellipsis to work */
        }

        .title {
            font-weight: 600;
            font-size: 1.05rem;
            margin: 0 0 4px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .artist {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin: 0;
        }

        .meta {
            display: flex;
            gap: 12px;
            margin-top: 6px;
            font-size: 0.75rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Skeleton System */
        .skeleton {
            background: linear-gradient(90deg, var(--skeleton) 25%, #2d3748 50%, var(--skeleton) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .error-msg {
            padding: 2rem;
            text-align: center;
            color: #ef4444;
            background: #450a0a;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>ZedTopVibes</h1>
    </header>

    <div id="feed" class="album-list">
        <div class="album-card"><div class="img-wrapper skeleton"></div><div class="content"><div class="skeleton" style="height:18px; width:60%; border-radius:4px"></div><div class="skeleton" style="height:14px; width:40%; margin-top:10px; border-radius:4px"></div></div></div>
        <div class="album-card"><div class="img-wrapper skeleton"></div><div class="content"><div class="skeleton" style="height:18px; width:60%; border-radius:4px"></div><div class="skeleton" style="height:14px; width:40%; margin-top:10px; border-radius:4px"></div></div></div>
        <div class="album-card"><div class="img-wrapper skeleton"></div><div class="content"><div class="skeleton" style="height:18px; width:60%; border-radius:4px"></div><div class="skeleton" style="height:14px; width:40%; margin-top:10px; border-radius:4px"></div></div></div>
    </div>
</div>

<script>
    const API_ENDPOINT = 'https://zedtopvibes.com/api/albums';
    const feed = document.getElementById('feed');

    async function fetchAlbums() {
        try {
            const response = await fetch(API_ENDPOINT);
            if (!response.ok) throw new Error('Network response was not ok');
            
            const data = await response.json();
            renderAlbums(data);
        } catch (error) {
            console.error('Fetch error:', error);
            feed.innerHTML = `
                <div class="error-msg">
                    <strong>Oops!</strong> We couldn't load the tunes right now.
                </div>
            `;
        }
    }

    function renderAlbums(albums) {
        // Clear skeletons
        feed.innerHTML = '';

        if (albums.length === 0) {
            feed.innerHTML = '<p style="text-align:center">No albums found.</p>';
            return;
        }

        albums.forEach(album => {
            const card = document.createElement('a');
            card.href = `#/album/${album.slug}`;
            card.className = 'album-card';
            
            // Format plays/downloads for the meta bar
            const plays = album.plays ? `${album.plays} Plays` : '';
            const genre = album.genre || 'General';

            card.innerHTML = `
                <div class="img-wrapper">
                    <img src="${album.cover_url}" 
                         alt="${album.title}" 
                         loading="lazy"
                         onerror="this.src='https://via.placeholder.com/80?text=No+Cover'">
                </div>
                <div class="content">
                    <h2 class="title">${album.title}</h2>
                    <p class="artist">${album.artist}</p>
                    <div class="meta">
                        <span>${genre}</span>
                        <span>${plays}</span>
                    </div>
                </div>
            `;
            feed.appendChild(card);
        });
    }

    // Initialize
    fetchAlbums();
</script>

</body>
</html>
