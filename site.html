<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Albums - No Layout Shift Test</title>
    <style>
        /* RESERVE SPACE BEFORE API CALLS */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
            background: #0a0a0a;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* SMALL IMAGES: Adjusted grid for smaller cards */
        .albums-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));  /* Changed from 280px to 160px */
            gap: 16px;  /* Smaller gap */
            margin-top: 32px;
            min-height: 300px;  /* Adjusted for smaller cards */
        }

        /* Skeleton card - matches smaller card dimensions */
        .skeleton-card {
            background: #1a1a1a;
            border-radius: 8px;  /* Slightly smaller radius */
            overflow: hidden;
            height: 220px;  /* Reduced from 380px to 220px */
            animation: pulse 1.5s ease-in-out infinite;
        }

        .skeleton-image {
            width: 100%;
            height: 160px;  /* Reduced from 280px to 160px */
            background: #2a2a2a;
        }

        .skeleton-text {
            padding: 8px;  /* Smaller padding */
        }

        .skeleton-title {
            height: 16px;  /* Smaller text */
            background: #2a2a2a;
            margin-bottom: 6px;
            border-radius: 3px;
        }

        .skeleton-artist {
            height: 12px;  /* Smaller text */
            background: #2a2a2a;
            width: 70%;
            border-radius: 3px;
        }

        /* Real album card - matches skeleton exactly */
        .album-card {
            background: #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s;
            height: 220px;  /* Same as skeleton */
            display: flex;
            flex-direction: column;
        }

        .album-card:hover {
            transform: translateY(-2px);
        }

        /* CRITICAL: Fixed dimensions for small images */
        .album-cover {
            width: 100%;
            height: 160px;  /* Fixed height matches skeleton */
            object-fit: cover;
            background: #2a2a2a;
        }

        .album-info {
            padding: 8px;
            flex: 1;
        }

        .album-title {
            font-size: 13px;  /* Smaller font */
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .album-artist {
            font-size: 11px;  /* Smaller font */
            color: #999;
        }

        .album-meta {
            font-size: 10px;  /* Smaller font */
            color: #666;
            margin-top: 6px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .error-message {
            background: #dc2626;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .stats {
            margin-top: 20px;
            padding: 12px;
            background: #1a1a1a;
            border-radius: 8px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Albums</h1>
        
        <!-- Grid with reserved space -->
        <div id="albums-container" class="albums-grid">
            <!-- Skeleton loaders - 6 skeletons for better grid filling -->
            <div class="skeleton-card">
                <div class="skeleton-image"></div>
                <div class="skeleton-text">
                    <div class="skeleton-title"></div>
                    <div class="skeleton-artist"></div>
                </div>
            </div>
            <div class="skeleton-card">
                <div class="skeleton-image"></div>
                <div class="skeleton-text">
                    <div class="skeleton-title"></div>
                    <div class="skeleton-artist"></div>
                </div>
            </div>
            <div class="skeleton-card">
                <div class="skeleton-image"></div>
                <div class="skeleton-text">
                    <div class="skeleton-title"></div>
                    <div class="skeleton-artist"></div>
                </div>
            </div>
            <div class="skeleton-card">
                <div class="skeleton-image"></div>
                <div class="skeleton-text">
                    <div class="skeleton-title"></div>
                    <div class="skeleton-artist"></div>
                </div>
            </div>
            <div class="skeleton-card">
                <div class="skeleton-image"></div>
                <div class="skeleton-text">
                    <div class="skeleton-title"></div>
                    <div class="skeleton-artist"></div>
                </div>
            </div>
            <div class="skeleton-card">
                <div class="skeleton-image"></div>
                <div class="skeleton-text">
                    <div class="skeleton-title"></div>
                    <div class="skeleton-artist"></div>
                </div>
            </div>
        </div>

        <div id="stats" class="stats" style="display: none;"></div>
    </div>

    <script>
        async function loadAlbums() {
            const container = document.getElementById('albums-container');
            const statsDiv = document.getElementById('stats');
            
            try {
                const response = await fetch('https://zedtopvibes.com/api/albums');
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const albums = await response.json();
                
                if (!albums.length) {
                    container.innerHTML = '<div style="grid-column: 1/-1; text-align: center;">No albums found</div>';
                    return;
                }
                
                // Replace skeletons with real content
                container.innerHTML = albums.map(album => `
                    <div class="album-card">
                        <img 
                            class="album-cover" 
                            src="${album.cover_url || ''}" 
                            alt="${escapeHtml(album.title)}"
                            loading="lazy"
                            onerror="this.style.background='#2a2a2a'"
                        >
                        <div class="album-info">
                            <div class="album-title" title="${escapeHtml(album.title)}">
                                ${escapeHtml(album.title)}
                            </div>
                            <div class="album-artist">
                                ${escapeHtml(album.artist)}
                            </div>
                            <div class="album-meta">
                                🎵 ${album.plays?.toLocaleString() || 0}
                            </div>
                        </div>
                    </div>
                `).join('');
                
                statsDiv.style.display = 'block';
                statsDiv.innerHTML = `✅ Loaded ${albums.length} albums | No layout shift`;
                
            } catch (error) {
                console.error('Failed to load albums:', error);
                container.innerHTML = `
                    <div class="error-message" style="grid-column: 1/-1;">
                        ⚠️ Failed to load: ${error.message}<br>
                        <button onclick="location.reload()" style="margin-top: 10px; padding: 8px 16px;">Retry</button>
                    </div>
                `;
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
        
        loadAlbums();
    </script>
</body>
</html>
