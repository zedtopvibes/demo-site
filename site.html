<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZedTopVibes | All Albums</title>
    <style>
        :root {
            --bg: #0f172a;
            --header-bg: #1e293b;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --skeleton: #334155;
            --header-height: 64px;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            height: var(--header-height);
            background: var(--header-bg);
            display: flex;
            align-items: center;
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #334155;
        }

        main { flex: 1; padding: 24px; }

        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Shared Card Styles */
        .album-card, .skeleton-card {
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .img-box {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: var(--skeleton);
        }

        .img-box img {
            width: 100%; height: 100%; object-fit: cover; display: block;
        }

        .info { padding: 12px; height: 60px; display: flex; flex-direction: column; justify-content: center; }

        .title { font-size: 0.9rem; font-weight: 700; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .artist { font-size: 0.8rem; color: var(--text-dim); margin-top: 4px; }

        /* Skeleton Specific Styles */
        .skeleton-text {
            height: 12px;
            background: var(--skeleton);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }

        .skeleton-text.short { width: 60%; margin-top: 8px; }

        /* Shimmer Animation */
        .shimmer::after {
            content: "";
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        footer {
            background: var(--header-bg);
            padding: 20px;
            text-align: center;
            border-top: 1px solid #334155;
            color: var(--text-dim);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <header><h1>ZedTopVibes</h1></header>

    <main>
        <div class="album-grid" id="album-grid">
            <div class="skeleton-card"><div class="img-box shimmer"></div><div class="info"><div class="skeleton-text shimmer"></div><div class="skeleton-text short shimmer"></div></div></div>
            <div class="skeleton-card"><div class="img-box shimmer"></div><div class="info"><div class="skeleton-text shimmer"></div><div class="skeleton-text short shimmer"></div></div></div>
            <div class="skeleton-card"><div class="img-box shimmer"></div><div class="info"><div class="skeleton-text shimmer"></div><div class="skeleton-text short shimmer"></div></div></div>
            <div class="skeleton-card"><div class="img-box shimmer"></div><div class="info"><div class="skeleton-text shimmer"></div><div class="skeleton-text short shimmer"></div></div></div>
            
    </main>

    <footer>&copy; 2026 ZedTopVibes</footer>

    <script>
        const API_URL = 'https://zedtopvibes.com/api/albums';
        const grid = document.getElementById('album-grid');

        async function load() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                let html = '';
                data.forEach(album => {
                    html += `
                    <div class="album-card">
                        <div class="img-box">
                            <img src="${album.cover_url}" alt="${album.title}" width="300" height="300" loading="lazy">
                        </div>
                        <div class="info">
                            <div class="title">${album.title}</div>
                            <div class="artist">${album.artist || 'Unknown'}</div>
                        </div>
                    </div>`;
                });
                
                // Clear skeletons and inject real data
                grid.innerHTML = html;
            } catch (e) { 
                console.error(e); 
            }
        }
        load();
    </script>
</body>
</html>
