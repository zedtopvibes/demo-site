<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZedTopVibes | Static Performance</title>
    <style>
        :root {
            --bg: #000000;
            --card: #0a0a0a;
            --text-main: #ffffff;
            --text-dim: #666666;
            --skeleton: #1a1a1a;
            --border-glow: #00ff88;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 2rem 1rem;
        }

        .container { 
            max-width: 700px; 
            margin: 0 auto; 
        }

        /* Header section */
        .header {
            margin-bottom: 2rem;
            text-align: center;
            border-bottom: 1px solid var(--border-glow);
            padding-bottom: 1rem;
        }

        .header h1 {
            font-size: 2rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff, var(--border-glow));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header p {
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        .album-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .album-card {
            display: flex;
            align-items: center;
            background: var(--card);
            border-radius: 12px;
            padding: 12px;
            gap: 16px;
            height: 100px; /* RIGID HEIGHT LOCK */
            box-sizing: border-box;
            overflow: hidden;
            border: 1px solid #1a1a1a;
            transition: border-color 0.2s ease;
        }

        .album-card:hover {
            border-color: var(--border-glow);
        }

        .img-box {
            width: 76px;
            height: 76px;
            flex-shrink: 0;
            background-color: var(--skeleton);
            border-radius: 8px;
            overflow: hidden;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .info {
            flex-grow: 1;
            min-width: 0;
        }

        .title {
            font-weight: 600;
            margin: 0 0 6px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            height: 1.3em;
            font-size: 1rem;
        }

        .artist {
            color: var(--text-dim);
            font-size: 0.85rem;
            margin: 0;
            height: 1.2em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* STATIC skeleton - NO PULSE */
        .skeleton-static {
            background-color: var(--skeleton);
            border-radius: 4px;
        }

        /* Counter badge */
        .count-badge {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-dim);
            font-family: monospace;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>ZEDTOP VIBES</h1>
        <p>◢ vertical flow • static skeleton • instant swap</p>
    </div>

    <div id="album-grid" class="album-list">
        <div class="album-card"><div class="img-box skeleton-static"></div><div class="info"><div class="title skeleton-static" style="width:70%"></div><div class="artist skeleton-static" style="width:40%"></div></div></div>
        <div class="album-card"><div class="img-box skeleton-static"></div><div class="info"><div class="title skeleton-static" style="width:70%"></div><div class="artist skeleton-static" style="width:40%"></div></div></div>
        <div class="album-card"><div class="img-box skeleton-static"></div><div class="info"><div class="title skeleton-static" style="width:70%"></div><div class="artist skeleton-static" style="width:40%"></div></div></div>
    </div>

    <div class="count-badge" id="count-badge">— ALBUMS —</div>
</div>

<script>
    const API_URL = 'https://zedtopvibes.com/api/albums';
    const grid = document.getElementById('album-grid');
    const badge = document.getElementById('count-badge');

    async function load() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            
            let html = '';
            data.forEach(album => {
                html += `
                <div class="album-card">
                    <div class="img-box">
                        <img src="${album.cover_url}" alt="${album.title}" loading="lazy">
                    </div>
                    <div class="info">
                        <div class="title">${album.title}</div>
                        <div class="artist">${album.artist || 'Unknown'}</div>
                    </div>
                </div>`;
            });
            
            // ATOMIC SWAP - identical to original approach
            grid.innerHTML = html;
            badge.textContent = `${data.length} ALBUMS • STATIC LOADED`;
        } catch (e) { 
            console.error(e);
            badge.textContent = 'ERROR LOADING';
        }
    }
    load();
</script>
</body>
</html>
