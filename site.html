<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZedTopVibes | All Albums</title>
    <style>
        :root {
            --bg: #0f172a;
            --header-bg: #1e293b;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --header-height: 64px;
            --footer-height: 80px;
        }

        /* Essential for Zero Layout Shift */
        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* Keeps footer at bottom during load */
        }

        /* Sticky Header: Reserves space at top */
        header {
            height: var(--header-height);
            background: var(--header-bg);
            display: flex;
            align-items: center;
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #334155;
        }

        header h1 {
            font-size: 1.25rem;
            margin: 0;
            color: var(--accent);
        }

        main {
            flex: 1; /* Pushes footer down */
            padding: 24px;
        }

        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .album-card {
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Image Aspect Ratio: The heart of No Layout Shift */
        .img-box {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #334155;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Fixed text area: Prevents vertical jumps */
        .info {
            padding: 12px;
            height: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .title {
            font-size: 0.9rem;
            font-weight: 700;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .artist {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 4px;
        }

        /* Fixed Footer */
        footer {
            background: var(--header-bg);
            height: var(--footer-height);
            display: flex;
            align-items: center;
            justify-content: center;
            border-top: 1px solid #334155;
            color: var(--text-dim);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>ZedTopVibes</h1>
    </header>

    <main>
        <div class="album-grid" id="album-grid">
            </div>
    </main>

    <footer>
        <p>&copy; 2026 ZedTopVibes. All rights reserved.</p>
    </footer>

    <script>
        const API_URL = 'https://zedtopvibes.com/api/albums';
        const grid = document.getElementById('album-grid');

        async function load() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                let html = '';
                data.forEach(album => {
                    html += `
                    <div class="album-card">
                        <div class="img-box">
                            <img src="${album.cover_url}" 
                                 alt="${album.title}" 
                                 width="300" height="300" 
                                 loading="lazy">
                        </div>
                        <div class="info">
                            <div class="title">${album.title}</div>
                            <div class="artist">${album.artist || 'Unknown'}</div>
                        </div>
                    </div>`;
                });
                
                grid.innerHTML = html;
            } catch (e) { 
                console.error(e); 
            }
        }
        load();
    </script>
</body>
</html>
