<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Compilations</title>

  <link rel="preconnect" href="https://zedtopvibes.com">
  <link rel="dns-prefetch" href="https://zedtopvibes.com">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f0f0f;
      color: #fff;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #1a1a1a;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: #1e1e1e;
      border-radius: 10px;
      overflow: hidden;
      min-height: 250px;
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      background: #2a2a2a;
    }

    .card-content {
      padding: 10px;
    }

    .title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .meta {
      font-size: 12px;
      color: #aaa;
    }

    .desc {
      font-size: 13px;
      margin-top: 8px;
      color: #ccc;
    }
  </style>
</head>

<body>

<header>
  <h1>Compilations</h1>
</header>

<div id="content" class="grid"></div>

<script>
  const API_URL = "https://zedtopvibes.com/api/compilations-home";
  const BASE_URL = "https://zedtopvibes.com";

  function getImg(url) {
    if (!url) return "https://via.placeholder.com/300";
    return url.startsWith("http") ? url : BASE_URL + url;
  }

  function render(data) {
    const content = document.getElementById("content");

    content.innerHTML = data.map(item => `
      <div class="card">
        <img 
          src="${getImg(item.cover_url)}"
          loading="eager"
          fetchpriority="${item.is_featured ? 'high' : 'low'}"
          decoding="async"
          onerror="this.src='https://via.placeholder.com/300'"
        />
        <div class="card-content">
          <div class="title">${item.title || "No Title"}</div>
          <div class="meta">
            ${item.type || "N/A"} • ${item.views || 0} views • ${item.item_count || 0} items
          </div>
          <div class="desc">${item.description || ""}</div>
        </div>
      </div>
    `).join("");
  }

  async function loadData() {
    const content = document.getElementById("content");

    // ⚡ STEP 1: instant render from cache (NO LOADING STATE)
    const cached = localStorage.getItem("home_cache");

    if (cached) {
      try {
        const parsed = JSON.parse(cached);
        render(parsed.data);
      } catch (e) {}
    }

    // ⚡ STEP 2: background refresh (silent)
    try {
      const res = await fetch(API_URL);
      const json = await res.json();

      render(json.data);

      // update cache silently
      localStorage.setItem("home_cache", JSON.stringify(json));

    } catch (err) {
      console.error("API error:", err);
      // no UI changes (no loading state)
    }
  }

  loadData();
</script>

</body>
</html>
