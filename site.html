<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZedTopVibes | No Shift Layout</title>

<style>
:root {
    --bg: #0f172a;
    --card: #1e293b;
    --text-main: #f8fafc;
    --text-dim: #94a3b8;
    --skeleton: #334155;
}

body {
    margin: 0;
    font-family: system-ui;
    background: var(--bg);
    color: var(--text-main);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* ================= HEADER ================= */
.header {
    height: 64px; /* LOCKED */
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    background: var(--card);
    box-sizing: border-box;
}

.logo {
    font-weight: 700;
}

.nav {
    display: flex;
    gap: 12px;
}

.nav-item {
    width: 60px;
    height: 14px;
    border-radius: 4px;
}

/* ================= MAIN ================= */
.main {
    flex: 1;
    padding: 16px;
}

.album-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
}

/* CARD */
.album-card {
    background: var(--card);
    border-radius: 10px;
    overflow: hidden;
    height: 220px;
    display: flex;
    flex-direction: column;
}

.img-box {
    height: 140px;
    background: var(--skeleton);
}

.img-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.info {
    padding: 8px;
}

.title, .artist {
    height: 1.2em;
    overflow: hidden;
}

/* ================= FOOTER ================= */
.footer {
    height: 56px; /* LOCKED */
    background: var(--card);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    color: var(--text-dim);
}

/* ================= SKELETON ================= */
.skeleton {
    background: var(--skeleton);
    animation: pulse 1.5s infinite ease-in-out;
}

@keyframes pulse {
    0%,100% { opacity:1; }
    50% { opacity:0.5; }
}
</style>
</head>

<body>

<!-- HEADER -->
<header class="header">
    <div class="logo">ZedTopVibes</div>
    <div class="nav">
        <div class="nav-item skeleton"></div>
        <div class="nav-item skeleton"></div>
        <div class="nav-item skeleton"></div>
    </div>
</header>

<!-- MAIN -->
<main class="main">
    <div id="grid" class="album-grid">

        <!-- Skeleton cards -->
        <div class="album-card">
            <div class="img-box skeleton"></div>
            <div class="info">
                <div class="title skeleton" style="width:80%"></div>
                <div class="artist skeleton" style="width:50%"></div>
            </div>
        </div>

        <div class="album-card">
            <div class="img-box skeleton"></div>
            <div class="info">
                <div class="title skeleton" style="width:80%"></div>
                <div class="artist skeleton" style="width:50%"></div>
            </div>
        </div>

        <div class="album-card">
            <div class="img-box skeleton"></div>
            <div class="info">
                <div class="title skeleton" style="width:80%"></div>
                <div class="artist skeleton" style="width:50%"></div>
            </div>
        </div>

    </div>
</main>

<!-- FOOTER -->
<footer class="footer">
    © 2026 ZedTopVibes
</footer>

<script>
const API_URL = 'https://zedtopvibes.com/api/albums';
const grid = document.getElementById('grid');

async function load() {
    try {
        const res = await fetch(API_URL);
        const data = await res.json();

        let html = '';

        data.forEach(album => {
            html += `
            <div class="album-card">
                <div class="img-box">
                    <img src="${album.cover_url}" alt="${album.title}" loading="lazy">
                </div>
                <div class="info">
                    <div class="title">${album.title}</div>
                    <div class="artist">${album.artist || 'Unknown'}</div>
                </div>
            </div>`;
        });

        grid.innerHTML = html;

    } catch (e) {
        console.error(e);
    }
}

load();
</script>

</body>
</html>
