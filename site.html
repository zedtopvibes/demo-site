<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZedTopVibes | Ghost Loader</title>

<style>
:root {
    --bg: #0f172a;
    --card: #1e293b;
    --text-main: #f8fafc;
    --text-dim: #94a3b8;
    --ghost: rgba(148, 163, 184, 0.15);
}

body {
    font-family: system-ui, -apple-system, sans-serif;
    background-color: var(--bg);
    color: var(--text-main);
    margin: 0;
    padding: 1rem;
}

header, footer {
    text-align: center;
    color: var(--text-dim);
    margin-bottom: 1rem;
}

footer {
    margin-top: 1rem;
}

.container { 
    max-width: 600px; 
    margin: 0 auto; 
}

.album-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.album-card {
    display: flex;
    align-items: center;
    background: var(--card);
    border-radius: 8px;
    padding: 8px;
    gap: 12px;
    height: 96px;
    box-sizing: border-box;
    overflow: hidden;
}

/* 👻 Ghost skeleton style */
.ghost {
    background: var(--ghost);
    border-radius: 6px;
    filter: blur(0.3px);
}

/* image placeholder */
.img-box {
    width: 80px;
    height: 80px;
    flex-shrink: 0;
}

/* text placeholders */
.line {
    height: 10px;
    margin-bottom: 8px;
    border-radius: 4px;
}

.w70 { width: 70%; }
.w40 { width: 40%; }

.info {
    flex-grow: 1;
    min-width: 0;
}

/* real content */
.img-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

.title {
    font-weight: 700;
    margin: 0 0 4px 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    height: 1.2em;
}

.artist {
    color: var(--text-dim);
    font-size: 0.9rem;
    margin: 0;
    height: 1.2em;
}
</style>
</head>

<body>

<header>
    <h2>ZedTopVibes</h2>
</header>

<div class="container">
    <div id="album-grid" class="album-list">

        <!-- 👻 Ghost loader cards -->
        <div class="album-card">
            <div class="img-box ghost"></div>
            <div class="info">
                <div class="ghost line w70"></div>
                <div class="ghost line w40"></div>
            </div>
        </div>

        <div class="album-card">
            <div class="img-box ghost"></div>
            <div class="info">
                <div class="ghost line w70"></div>
                <div class="ghost line w40"></div>
            </div>
        </div>

        <div class="album-card">
            <div class="img-box ghost"></div>
            <div class="info">
                <div class="ghost line w70"></div>
                <div class="ghost line w40"></div>
            </div>
        </div>

    </div>
</div>

<footer>
    <small>© 2026 ZedTopVibes</small>
</footer>

<script>
const API_URL = 'https://zedtopvibes.com/api/albums';
const grid = document.getElementById('album-grid');

async function load() {
    try {
        const res = await fetch(API_URL);
        const data = await res.json();
        
        let html = '';
        data.forEach(album => {
            html += `
            <div class="album-card">
                <div class="img-box">
                    <img src="${album.cover_url}" alt="${album.title}" loading="lazy">
                </div>
                <div class="info">
                    <div class="title">${album.title}</div>
                    <div class="artist">${album.artist || 'Unknown'}</div>
                </div>
            </div>`;
        });
        
        grid.innerHTML = html;
    } catch (e) { console.error(e); }
}
load();
</script>

</body>
</html>
