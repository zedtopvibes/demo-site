<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .album-card { transition: transform 0.2s; }
        .album-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-gray-900 text-white p-8">

    <div class="max-w-6xl mx-auto">
        <h1 class="text-4xl font-bold mb-8">Latest Releases</h1>
        
        <div id="album-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
            <p id="fallback">Loading content...</p>
        </div>
    </div>

    <script>
        // 1. Grab the preloaded data injected by the Worker
        const albums = window.__INITIAL_DATA__ || [];

        const grid = document.getElementById('album-grid');
        const fallback = document.getElementById('fallback');

        if (albums.length > 0) {
            fallback.remove(); // Clear loading message
            
            // 2. Render the albums immediately
            grid.innerHTML = albums.map(album => `
                <div class="album-card bg-gray-800 rounded-lg overflow-hidden shadow-lg">
                    <img src="${album.cover_url || 'https://via.placeholder.com/300'}" 
                         alt="${album.title}" 
                         class="w-full aspect-square object-cover">
                    <div class="p-4">
                        <h3 class="font-bold truncate">${album.title}</h3>
                        <p class="text-gray-400 text-sm">${album.artist}</p>
                    </div>
                </div>
            `).join('');
        } else {
            fallback.innerText = "No albums found.";
        }
    </script>
</body>
</html>
