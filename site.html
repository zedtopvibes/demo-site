<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZedTopVibes | 80x80 Zero Shift</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --skeleton: #334155;
            --header-h: 60px;
            --footer-h: 50px;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            /* Prevents the whole body from shifting */
            overflow-x: hidden; 
        }

        /* Fixed Header - No Shift */
        header {
            height: var(--header-h);
            background: #1e293b;
            display: flex;
            align-items: center;
            padding: 0 1rem;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid #334155;
            box-sizing: border-box;
        }

        .container { 
            max-width: 600px; 
            margin: 0 auto; 
            padding: 1rem;
            /* Ensures space for footer so it doesn't overlap last item */
            padding-bottom: calc(var(--footer-h) + 1rem); 
        }

        .album-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .album-card {
            display: flex;
            align-items: center;
            background: var(--card);
            border-radius: 8px;
            padding: 8px;
            gap: 12px;
            height: 96px; 
            box-sizing: border-box;
            overflow: hidden;
        }

        .img-box {
            width: 80px;
            height: 80px;
            flex-shrink: 0;
            background-color: var(--skeleton);
            border-radius: 4px;
            overflow: hidden;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .info {
            flex-grow: 1;
            min-width: 0;
        }

        .title {
            font-weight: 700;
            margin: 0 0 4px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            height: 1.2em;
        }

        .artist {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin: 0;
            height: 1.2em;
        }

        footer {
            height: var(--footer-h);
            background: #0f172a;
            border-top: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: var(--text-dim);
            position: fixed;
            bottom: 0;
            width: 100%;
        }

        .skeleton-pulse {
            animation: pulse 1.5s infinite ease-in-out;
            background-color: var(--skeleton);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>

<header>
    <strong style="color: #3b82f6;">ZEDTOPVIBES</strong>
</header>

<div class="container">
    <div id="album-grid" class="album-list">
        <div class="album-card"><div class="img-box skeleton-pulse"></div><div class="info"><div class="title skeleton-pulse" style="width:70%"></div><div class="artist skeleton-pulse" style="width:40%"></div></div></div>
        <div class="album-card"><div class="img-box skeleton-pulse"></div><div class="info"><div class="title skeleton-pulse" style="width:70%"></div><div class="artist skeleton-pulse" style="width:40%"></div></div></div>
        <div class="album-card"><div class="img-box skeleton-pulse"></div><div class="info"><div class="title skeleton-pulse" style="width:70%"></div><div class="artist skeleton-pulse" style="width:40%"></div></div></div>
        <div class="album-card"><div class="img-box skeleton-pulse"></div><div class="info"><div class="title skeleton-pulse" style="width:70%"></div><div class="artist skeleton-pulse" style="width:40%"></div></div></div>
    </div>
</div>

<footer>
    &copy; 2026 ZedTopVibes
</footer>

<script>
    const API_URL = 'https://zedtopvibes.com/api/albums';
    const grid = document.getElementById('album-grid');

    async function load() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            
            let html = '';
            data.forEach(album => {
                html += `
                <div class="album-card">
                    <div class="img-box">
                        <img src="${album.cover_url}" alt="${album.title}" loading="lazy" onload="this.style.opacity=1" style="opacity:0; transition: opacity 0.2s;">
                    </div>
                    <div class="info">
                        <div class="title">${album.title}</div>
                        <div class="artist">${album.artist || 'Unknown Artist'}</div>
                    </div>
                </div>`;
            });
            
            grid.innerHTML = html;
        } catch (e) { console.error(e); }
    }
    load();
</script>
</body>
</html>
