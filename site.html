<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZedTopVibes | Horizontal Scroll</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: #111111;
            --text-main: #ffffff;
            --text-dim: #888888;
            --skeleton: #1a1a1a;
            --accent: #00ff88;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background-color: var(--bg);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Header with neon accent */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--accent);
            padding: 1rem 2rem;
            z-index: 100;
        }

        .header h1 {
            font-size: 1.5rem;
            letter-spacing: -1px;
        }

        .header p {
            color: var(--text-dim);
            font-size: 0.8rem;
            margin-top: 0.25rem;
        }

        /* Horizontal scroll container */
        .scroll-container {
            margin-top: 100px;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            padding: 2rem;
            scroll-behavior: smooth;
            cursor: grab;
        }

        .scroll-container:active {
            cursor: grabbing;
        }

        .album-strip {
            display: inline-flex;
            gap: 20px;
            white-space: normal;
        }

        /* Card design - horizontal orientation flipped */
        .album-card {
            display: inline-flex;
            flex-direction: column;
            width: 200px;
            height: 280px; /* RIGID HEIGHT LOCK */
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.2s ease;
            cursor: pointer;
            flex-shrink: 0;
        }

        .album-card:hover {
            transform: translateY(-5px);
        }

        /* Image container - top portion */
        .img-box {
            width: 100%;
            height: 200px;
            flex-shrink: 0;
            background-color: var(--skeleton);
            overflow: hidden;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Info at bottom */
        .info {
            padding: 12px;
            height: 80px; /* LOCKED HEIGHT */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .title {
            font-weight: 700;
            font-size: 0.9rem;
            margin: 0;
            white-space: normal;
            word-wrap: break-word;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            height: 2.4em; /* LOCK for 2 lines */
        }

        .artist {
            color: var(--accent);
            font-size: 0.75rem;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            height: 1.2em; /* LOCK */
        }

        /* Static skeleton (no pulse) */
        .skeleton-static {
            background-color: var(--skeleton);
            border-radius: 4px;
        }

        /* Custom scrollbar */
        .scroll-container::-webkit-scrollbar {
            height: 8px;
        }

        .scroll-container::-webkit-scrollbar-track {
            background: var(--card-bg);
            border-radius: 4px;
        }

        .scroll-container::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }

        /* Loading counter */
        .loading-badge {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            background: var(--accent);
            color: black;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            font-family: monospace;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .loading-badge.visible {
            opacity: 1;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>◢ ZEDTOP VIBES</h1>
    <p>horizontal | monochrome | neon cut</p>
</div>

<div class="scroll-container" id="scroll-container">
    <div class="album-strip" id="album-strip">
        <!-- Static skeleton cards - exact same dimensions as real content -->
        <div class="album-card"><div class="img-box skeleton-static"></div><div class="info"><div class="title skeleton-static" style="width:90%; height:0.8rem; margin-bottom:8px"></div><div class="artist skeleton-static" style="width:60%; height:0.7rem"></div></div></div>
        <div class="album-card"><div class="img-box skeleton-static"></div><div class="info"><div class="title skeleton-static" style="width:90%; height:0.8rem; margin-bottom:8px"></div><div class="artist skeleton-static" style="width:60%; height:0.7rem"></div></div></div>
        <div class="album-card"><div class="img-box skeleton-static"></div><div class="info"><div class="title skeleton-static" style="width:90%; height:0.8rem; margin-bottom:8px"></div><div class="artist skeleton-static" style="width:60%; height:0.7rem"></div></div></div>
        <div class="album-card"><div class="img-box skeleton-static"></div><div class="info"><div class="title skeleton-static" style="width:90%; height:0.8rem; margin-bottom:8px"></div><div class="artist skeleton-static" style="width:60%; height:0.7rem"></div></div></div>
        <div class="album-card"><div class="img-box skeleton-static"></div><div class="info"><div class="title skeleton-static" style="width:90%; height:0.8rem; margin-bottom:8px"></div><div class="artist skeleton-static" style="width:60%; height:0.7rem"></div></div></div>
    </div>
</div>

<div class="loading-badge" id="loading-badge">LOADING</div>

<script>
    const API_URL = 'https://zedtopvibes.com/api/albums';
    const strip = document.getElementById('album-strip');
    const badge = document.getElementById('loading-badge');

    // Drag to scroll functionality for horizontal container
    const container = document.getElementById('scroll-container');
    let isDown = false;
    let startX;
    let scrollLeft;

    container.addEventListener('mousedown', (e) => {
        isDown = true;
        container.style.cursor = 'grabbing';
        startX = e.pageX - container.offsetLeft;
        scrollLeft = container.scrollLeft;
    });

    container.addEventListener('mouseleave', () => {
        isDown = false;
        container.style.cursor = 'grab';
    });

    container.addEventListener('mouseup', () => {
        isDown = false;
        container.style.cursor = 'grab';
    });

    container.addEventListener('mousemove', (e) => {
        if (!isDown) return;
        e.preventDefault();
        const x = e.pageX - container.offsetLeft;
        const walk = (x - startX) * 1.5;
        container.scrollLeft = scrollLeft - walk;
    });

    async function load() {
        try {
            badge.classList.add('visible');
            const res = await fetch(API_URL);
            const data = await res.json();
            
            let html = '';
            data.forEach(album => {
                html += `
                <div class="album-card">
                    <div class="img-box">
                        <img src="${album.cover_url}" alt="${album.title}" loading="lazy">
                    </div>
                    <div class="info">
                        <div class="title">${escapeHtml(album.title)}</div>
                        <div class="artist">${escapeHtml(album.artist || 'UNKNOWN')}</div>
                    </div>
                </div>`;
            });
            
            // ATOMIC SWAP - identical dimensions preserve layout
            strip.innerHTML = html;
            badge.classList.remove('visible');
        } catch (e) { 
            console.error(e);
            badge.textContent = 'ERROR';
            badge.classList.add('visible');
            setTimeout(() => {
                badge.classList.remove('visible');
                badge.textContent = 'LOADING';
            }, 2000);
        }
    }

    // Simple XSS protection
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    load();
</script>
</body>
</html>
