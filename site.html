<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero-Shift 80x80</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --skeleton: #334155;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        #app-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Core Layout Constraints */
        .album-card {
            height: 96px; /* Constraint 1 */
            background: var(--card-bg);
            border-radius: 8px;
            padding: 0 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            overflow: hidden;
        }

        .img-box {
            width: 80px;  /* Constraint 2 */
            height: 80px; /* Constraint 2 */
            flex-shrink: 0;
            background: var(--skeleton);
            border-radius: 4px;
            overflow: hidden;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info-box {
            flex-grow: 1;
            min-width: 0; /* Ensures ellipsis works in flex */
        }

        .title, .artist {
            height: 1.2em; /* Constraint 3 */
            line-height: 1.2em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin: 0;
        }

        .title { font-weight: 600; font-size: 1rem; color: var(--text-main); }
        .artist { font-size: 0.875rem; color: var(--text-dim); margin-top: 4px; }

        /* Skeleton State */
        .skeleton-pulse {
            animation: pulse 1.5s infinite ease-in-out;
            background-color: var(--skeleton);
        }

        .skeleton-text {
            width: 60%;
            height: 12px;
            border-radius: 4px;
        }

        .skeleton-text.short { width: 40%; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <main id="app-container">
        <div class="album-card">
            <div class="img-box skeleton-pulse"></div>
            <div class="info-box">
                <div class="skeleton-text skeleton-pulse" style="margin-bottom: 8px;"></div>
                <div class="skeleton-text short skeleton-pulse"></div>
            </div>
        </div>
        <div class="album-card">
            <div class="img-box skeleton-pulse"></div>
            <div class="info-box">
                <div class="skeleton-text skeleton-pulse" style="margin-bottom: 8px;"></div>
                <div class="skeleton-text short skeleton-pulse"></div>
            </div>
        </div>
        <div class="album-card">
            <div class="img-box skeleton-pulse"></div>
            <div class="info-box">
                <div class="skeleton-text skeleton-pulse" style="margin-bottom: 8px;"></div>
                <div class="skeleton-text short skeleton-pulse"></div>
            </div>
        </div>
    </main>

    <script>
        async function fetchAlbums() {
            const container = document.getElementById('app-container');
            
            try {
                // Replace URL with your actual Cloudflare Worker endpoint
                const response = await fetch('https://zedtopvibes.com/api/albums'); 
                const data = await response.json();

                if (!Array.isArray(data)) throw new Error("Invalid Data");

                // Atomic Injection: Build full string in memory
                let htmlBuffer = "";
                
                data.forEach(album => {
                    htmlBuffer += `
                        <div class="album-card">
                            <div class="img-box">
                                <img src="${album.cover_url}" alt="${album.title}" loading="lazy">
                            </div>
                            <div class="info-box">
                                <h2 class="title">${album.title}</h2>
                                <p class="artist">${album.artist}</p>
                            </div>
                        </div>
                    `;
                });

                // Single DOM update
                container.innerHTML = htmlBuffer;

            } catch (error) {
                console.error("Fetch failed:", error);
                // Optional: Render error state inside the container
            }
        }

        // Initialize
        window.addEventListener('DOMContentLoaded', fetchAlbums);
    </script>
</body>
</html>
