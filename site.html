<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Compilations</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f0f0f;
      color: #fff;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #1a1a1a;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 15px;
    }

    select, button {
      padding: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      cursor: pointer;
      background: #ff3b7b;
      color: white;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: #1e1e1e;
      border-radius: 10px;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      background: #2a2a2a;
    }

    .card-content {
      padding: 10px;
    }

    .title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .meta {
      font-size: 12px;
      color: #aaa;
    }

    .desc {
      font-size: 13px;
      margin-top: 8px;
      color: #ccc;
    }

    /* Skeleton */
    .skeleton {
      animation: pulse 1.2s infinite ease-in-out;
      background: #2a2a2a;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.4; }
      100% { opacity: 1; }
    }

    .skeleton-card {
      background: #1e1e1e;
      border-radius: 10px;
      overflow: hidden;
    }

    .skeleton-img {
      width: 100%;
      height: 150px;
    }

    .skeleton-line {
      height: 12px;
      margin: 8px 10px;
      border-radius: 4px;
    }

    .w-80 { width: 80%; }
    .w-60 { width: 60%; }
    .w-40 { width: 40%; }
  </style>
</head>

<body>

<header>
  <h1>Compilations</h1>
</header>

<div class="controls">
  <select id="type">
    <option value="">All Types</option>
    <option value="music">Music</option>
    <option value="video">Video</option>
    <option value="playlist">Playlist</option>
  </select>

  <button onclick="loadData()">Reload</button>
</div>

<div id="content" class="grid"></div>

<script>
  const API_URL = "https://zedtopvibes.com/api/compilations";
  const BASE_URL = "https://zedtopvibes.com";

  // SHOW SKELETON
  function showSkeleton(count = 8) {
    const content = document.getElementById("content");
    content.innerHTML = "";

    for (let i = 0; i < count; i++) {
      const div = document.createElement("div");
      div.className = "skeleton-card";

      div.innerHTML = `
        <div class="skeleton-img skeleton"></div>
        <div class="skeleton-line skeleton w-80"></div>
        <div class="skeleton-line skeleton w-60"></div>
        <div class="skeleton-line skeleton w-40"></div>
      `;

      content.appendChild(div);
    }
  }

  async function loadData() {
    const type = document.getElementById("type").value;
    const content = document.getElementById("content");

    showSkeleton();

    try {
      let url = API_URL + "?limit=12";
      if (type) url += "&type=" + encodeURIComponent(type);

      const res = await fetch(url);
      const data = await res.json();

      content.innerHTML = "";

      if (!Array.isArray(data)) {
        content.innerHTML = "<p style='padding:20px'>No data found</p>";
        return;
      }

      data.forEach(item => {

        // FIX IMAGE (handles /uploads/...)
        const imgSrc = item.cover_url
          ? (item.cover_url.startsWith("http")
              ? item.cover_url
              : BASE_URL + item.cover_url)
          : "https://via.placeholder.com/300";

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <img src="${imgSrc}" onerror="this.src='https://via.placeholder.com/300'" />
          <div class="card-content">
            <div class="title">${item.title || "No Title"}</div>
            <div class="meta">
              ${item.type || "N/A"} • ${item.views || 0} views • ${item.item_count || 0} items
            </div>
            <div class="desc">${item.description || ""}</div>
          </div>
        `;

        content.appendChild(card);
      });

    } catch (err) {
      console.error(err);
      content.innerHTML = "<p style='padding:20px'>Failed to load data</p>";
    }
  }

  loadData();
</script>

</body>
</html>
