<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Compilations</title>

  <!-- 🚀 LCP BOOST -->
  <link rel="preconnect" href="https://zedtopvibes.com">
  <link rel="dns-prefetch" href="https://zedtopvibes.com">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f0f0f;
      color: #fff;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #1a1a1a;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 15px;
    }

    select, button {
      padding: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      cursor: pointer;
      background: #ff3b7b;
      color: white;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: #1e1e1e;
      border-radius: 10px;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      background: #2a2a2a;
    }

    .card-content {
      padding: 10px;
    }

    .title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .meta {
      font-size: 12px;
      color: #aaa;
    }

    .desc {
      font-size: 13px;
      margin-top: 8px;
      color: #ccc;
    }

    .loading {
      padding: 20px;
      color: #aaa;
      text-align: center;
    }
  </style>
</head>

<body>

<header>
  <h1>Compilations</h1>
</header>

<div class="controls">
  <select id="type">
    <option value="">All Types</option>
    <option value="music">Music</option>
    <option value="video">Video</option>
    <option value="playlist">Playlist</option>
  </select>

  <button onclick="loadData()">Reload</button>
</div>

<div id="content" class="grid"></div>

<script>
  const API_URL = "https://zedtopvibes.com/api/compilations";
  const BASE_URL = "https://zedtopvibes.com";

  function getImg(url) {
    if (!url) return "https://via.placeholder.com/300";
    return url.startsWith("http") ? url : BASE_URL + url;
  }

  // ⚡ FAST FIRST PAINT (LCP OPTIMIZED)
  function renderFirstCard(item) {
    const content = document.getElementById("content");

    const imgSrc = getImg(item.cover_url);

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img 
        src="${imgSrc}" 
        fetchpriority="high"
        loading="eager"
        decoding="async"
        onerror="this.src='https://via.placeholder.com/300'"
      />
      <div class="card-content">
        <div class="title">${item.title || "No Title"}</div>
        <div class="meta">
          ${item.type || "N/A"} • ${item.views || 0} views • ${item.item_count || 0} items
        </div>
        <div class="desc">${item.description || ""}</div>
      </div>
    `;

    content.innerHTML = "";
    content.appendChild(card);
  }

  // ⚡ REST ITEMS (lazy load)
  function renderRest(data) {
    const content = document.getElementById("content");

    data.slice(1).forEach(item => {
      const imgSrc = getImg(item.cover_url);

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img 
          src="${imgSrc}" 
          loading="lazy"
          decoding="async"
          onerror="this.src='https://via.placeholder.com/300'"
        />
        <div class="card-content">
          <div class="title">${item.title || "No Title"}</div>
          <div class="meta">
            ${item.type || "N/A"} • ${item.views || 0} views • ${item.item_count || 0} items
          </div>
          <div class="desc">${item.description || ""}</div>
        </div>
      `;

      content.appendChild(card);
    });
  }

  async function loadData() {
    const type = document.getElementById("type").value;
    const content = document.getElementById("content");

    content.innerHTML = "<div class='loading'>Loading...</div>";

    try {
      let url = API_URL + "?limit=12";
      if (type) url += "&type=" + encodeURIComponent(type);

      const res = await fetch(url);
      const data = await res.json();

      if (!Array.isArray(data) || data.length === 0) {
        content.innerHTML = "<div class='loading'>No data found</div>";
        return;
      }

      // ⚡ LCP OPTIMIZATION: render FIRST ITEM immediately
      renderFirstCard(data[0]);

      // preload LCP image
      const img = new Image();
      img.src = getImg(data[0].cover_url);

      // render rest after paint
      requestAnimationFrame(() => {
        renderRest(data);
      });

    } catch (err) {
      console.error(err);
      content.innerHTML = "<div class='loading'>Failed to load</div>";
    }
  }

  loadData();
</script>

</body>
</html>
