<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZedTopVibes | Infinite Scroll</title>

<style>
:root {
    --bg: #0f172a;
    --card: #1e293b;
    --text-main: #f8fafc;
    --text-dim: #94a3b8;
}

body {
    font-family: system-ui, -apple-system, sans-serif;
    background-color: var(--bg);
    color: var(--text-main);
    margin: 0;
    padding: 1rem;
}

header, footer {
    text-align: center;
    color: var(--text-dim);
    margin-bottom: 1rem;
}

.container {
    max-width: 600px;
    margin: 0 auto;
}

.album-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.album-card {
    display: flex;
    align-items: center;
    background: var(--card);
    border-radius: 8px;
    padding: 8px;
    gap: 12px;
    height: 96px;
    box-sizing: border-box;
}

.img-box {
    width: 80px;
    height: 80px;
    flex-shrink: 0;
    border-radius: 4px;
    overflow: hidden;
    background: #334155;
}

.img-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.info {
    flex-grow: 1;
    min-width: 0;
}

.title {
    font-weight: 700;
    margin: 0 0 4px 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.artist {
    color: var(--text-dim);
    font-size: 0.9rem;
    margin: 0;
}

.loader {
    text-align: center;
    padding: 1rem;
    color: var(--text-dim);
}
</style>
</head>

<body>

<header>
    <h2>ZedTopVibes</h2>
</header>

<div class="container">
    <div id="album-grid" class="album-list"></div>
    <div id="loader" class="loader">Loading more...</div>
</div>

<footer>
    <small>© 2026 ZedTopVibes</small>
</footer>

<script>
const API_URL = 'https://zedtopvibes.com/api/albums';
const grid = document.getElementById('album-grid');
const loader = document.getElementById('loader');

let page = 0;
const limit = 10;
let loading = false;
let allLoaded = false;

async function loadMore() {
    if (loading || allLoaded) return;

    loading = true;

    try {
        const res = await fetch(API_URL);
        const data = await res.json();

        // simulate pagination (since API unknown)
        const slice = data.slice(page * limit, (page + 1) * limit);

        if (slice.length === 0) {
            allLoaded = true;
            loader.innerText = "No more albums";
            return;
        }

        let html = '';

        slice.forEach(album => {
            html += `
            <div class="album-card">
                <div class="img-box">
                    <img src="${album.cover_url}" alt="${album.title}" loading="lazy">
                </div>
                <div class="info">
                    <div class="title">${album.title}</div>
                    <div class="artist">${album.artist || 'Unknown'}</div>
                </div>
            </div>`;
        });

        grid.insertAdjacentHTML('beforeend', html);
        page++;

    } catch (e) {
        console.error(e);
    }

    loading = false;
}

// 🔥 Infinite scroll trigger
window.addEventListener('scroll', () => {
    const scrollY = window.scrollY;
    const height = document.body.offsetHeight;
    const viewport = window.innerHeight;

    if (scrollY + viewport >= height - 200) {
        loadMore();
    }
});

// initial load
loadMore();
</script>

</body>
</html>
