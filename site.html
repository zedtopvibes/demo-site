<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZedTopVibes | Latest Albums</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --muted: #94a3b8;
            --accent: #38bdf8;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Fixed Grid Layout to prevent jumping */
        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        /* Skeleton & Card Sizing */
        .album-card {
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s ease;
            text-decoration: none;
            color: inherit;
        }

        /* CRITICAL: Aspect ratio reserves 1:1 square space for the cover */
        .cover-box {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #2d3748;
            position: relative;
        }

        .cover-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .details {
            padding: 12px;
            min-height: 60px; /* Reserves space for text */
        }

        .details h3 {
            margin: 0;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .details p {
            margin: 4px 0 0;
            font-size: 0.8rem;
            color: var(--muted);
        }

        /* Skeleton Pulse Animation */
        .skeleton {
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 0.3; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>

<div class="container">
    <header style="margin-bottom: 30px;">
        <h1 style="color: var(--accent)">ZedTopVibes</h1>
    </header>

    <div id="grid" class="album-grid">
        <div class="album-card skeleton"><div class="cover-box"></div><div class="details"></div></div>
        <div class="album-card skeleton"><div class="cover-box"></div><div class="details"></div></div>
        <div class="album-card skeleton"><div class="cover-box"></div><div class="details"></div></div>
        <div class="album-card skeleton"><div class="cover-box"></div><div class="details"></div></div>
    </div>
</div>

<script>
    const API_URL = 'https://zedtopvibes.com/api/albums';
    const grid = document.getElementById('grid');

    async function loadAlbums() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            
            // Generate HTML using your API structure
            const html = data.map(album => `
                <div class="album-card">
                    <div class="cover-box">
                        <img src="${album.cover_url}" 
                             alt="${album.title}" 
                             loading="lazy" 
                             width="300" height="300">
                    </div>
                    <div class="details">
                        <h3>${album.title}</h3>
                        <p>${album.artist}</p>
                    </div>
                </div>
            `).join('');

            grid.innerHTML = html;
        } catch (error) {
            grid.innerHTML = `<p>Error loading albums from zedtopvibes.com</p>`;
            console.error('Fetch error:', error);
        }
    }

    loadAlbums();
</script>

</body>
</html>
