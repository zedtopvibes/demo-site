<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZedTopVibes | Zero Shift</title>
    <style>
        :root {
            --bg: #05070a;
            --card: #111827;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --skeleton: #1f2937;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
        }

        .container { max-width: 600px; margin: 0 auto; }

        /* The Secret to No Shift: Fixed Grid & Fixed Heights */
        .album-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .album-card {
            display: grid;
            grid-template-columns: 80px 1fr; /* Image is exactly 80px */
            grid-template-rows: 80px;        /* Row is exactly 80px */
            background: var(--card);
            border-radius: 12px;
            padding: 8px;
            gap: 16px;
            align-items: center;
            overflow: hidden;
            border: 1px solid #1e293b;
        }

        .img-wrapper {
            width: 80px;
            height: 80px;
            background-color: var(--skeleton);
            border-radius: 8px;
            overflow: hidden;
        }

        .img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            opacity: 0; /* Hidden until loaded to prevent flash */
            transition: opacity 0.3s ease;
        }

        .img-wrapper img.loaded { opacity: 1; }

        .content {
            min-width: 0; /* Prevents text from pushing the grid */
        }

        .title {
            font-size: 1rem;
            font-weight: 600;
            margin: 0 0 4px 0;
            height: 1.2em; /* Lock height */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .artist {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin: 0;
            height: 1.2em; /* Lock height */
        }

        /* Skeleton States */
        .is-loading .title, 
        .is-loading .artist {
            background: var(--skeleton);
            border-radius: 4px;
            color: transparent; /* Hide text color during load */
        }

        .shimmer {
            background: linear-gradient(90deg, var(--skeleton) 25%, #2d3748 50%, var(--skeleton) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <header style="padding: 1rem 0"><h1>Latest</h1></header>

    <div id="feed" class="album-list">
        </div>
</div>

<script>
    const API = 'https://zedtopvibes.com/api/albums';
    const feed = document.getElementById('feed');

    // 1. Immediately create 10 placeholder "slots"
    function createPlaceholders(count) {
        for (let i = 0; i < count; i++) {
            const slot = document.createElement('div');
            slot.className = 'album-card is-loading';
            slot.innerHTML = `
                <div class="img-wrapper shimmer">
                    <img src="" alt="" onload="this.classList.add('loaded')">
                </div>
                <div class="content">
                    <div class="title shimmer">&nbsp;</div>
                    <div class="artist shimmer">&nbsp;</div>
                </div>
            `;
            feed.appendChild(slot);
        }
    }

    async function loadData() {
        createPlaceholders(10); // Start with 10 slots

        try {
            const res = await fetch(API);
            const data = await res.json();
            const cards = document.querySelectorAll('.album-card');

            data.forEach((album, index) => {
                // If we have more data than placeholders, we can handle that, 
                // but for 1:1, we just update the existing slots.
                if (cards[index]) {
                    const card = cards[index];
                    const img = card.querySelector('img');
                    const title = card.querySelector('.title');
                    const artist = card.querySelector('.artist');

                    // Set data
                    img.src = album.cover_url;
                    title.textContent = album.title;
                    artist.textContent = album.artist || 'Unknown Artist';

                    // Remove loading states
                    card.classList.remove('is-loading');
                    title.classList.remove('shimmer');
                    artist.classList.remove('shimmer');
                    card.querySelector('.img-wrapper').classList.remove('shimmer');
                }
            });

            // Remove extra placeholders if data is less than 10
            if (data.length < cards.length) {
                for (let i = data.length; i < cards.length; i++) {
                    cards[i].remove();
                }
            }

        } catch (err) {
            console.error("Failed to fetch", err);
        }
    }

    loadData();
</script>

</body>
</html>
