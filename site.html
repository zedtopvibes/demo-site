<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Compilations</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f0f0f;
      color: #fff;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #1a1a1a;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 15px;
    }

    select, button {
      padding: 10px;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    button {
      cursor: pointer;
      background: #ff3b7b;
      color: white;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: #1e1e1e;
      border-radius: 10px;
      overflow: hidden;
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .card-content {
      padding: 10px;
    }

    .title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .meta {
      font-size: 12px;
      color: #aaa;
    }

    .desc {
      font-size: 13px;
      margin-top: 8px;
      color: #ccc;
    }

    .loading {
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>

<header>
  <h1>Compilations</h1>
</header>

<div class="controls">
  <select id="type">
    <option value="">All Types</option>
    <option value="music">Music</option>
    <option value="video">Video</option>
    <option value="playlist">Playlist</option>
  </select>

  <button onclick="loadData()">Load</button>
</div>

<div id="content" class="grid"></div>

<script>
  const API_URL = "https://zedtopvibes.com/api/compilations";

  async function loadData() {
    const type = document.getElementById("type").value;
    const content = document.getElementById("content");

    content.innerHTML = "<div class='loading'>Loading...</div>";

    try {
      let url = API_URL + "?limit=12";
      if (type) url += "&type=" + encodeURIComponent(type);

      const res = await fetch(url);
      const data = await res.json();

      if (!Array.isArray(data)) {
        content.innerHTML = "<div class='loading'>No data found</div>";
        return;
      }

      content.innerHTML = "";

      data.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <img src="${item.cover_url || 'https://via.placeholder.com/300'}" alt="">
          <div class="card-content">
            <div class="title">${item.title || "No Title"}</div>
            <div class="meta">
              Type: ${item.type || "N/A"} • Views: ${item.views || 0} • Items: ${item.item_count || 0}
            </div>
            <div class="desc">${item.description || ""}</div>
          </div>
        `;

        content.appendChild(card);
      });

    } catch (err) {
      console.error(err);
      content.innerHTML = "<div class='loading'>Error loading data</div>";
    }
  }

  // initial load
  loadData();
</script>

</body>
</html>
