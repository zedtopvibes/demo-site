<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZedTopVibes | Grid Concept</title>
    <style>
        :root {
            --bg: #020617;
            --card: #0f172a;
            --text-main: #f1f5f9;
            --text-dim: #64748b;
            --skeleton: #1e293b;
            --grid-gap: 16px;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        /* HEADER: Fixed height to prevent shift */
        header { height: 60px; margin-bottom: 20px; }

        /* THE GRID: The magic happens here */
        .album-grid {
            display: grid;
            /* Creates 80px wide columns. Adjust minmax for larger tiles */
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: var(--grid-gap);
        }

        .album-card {
            background: var(--card);
            border-radius: 12px;
            padding: 10px;
            /* RIGID HEIGHT: (Width is fluid, but we lock the vertical footprint) */
            display: flex;
            flex-direction: column;
            height: 210px; 
            box-sizing: border-box;
            transition: transform 0.2s;
        }

        /* 1:1 Aspect Ratio Box - Pre-books the space */
        .img-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: var(--skeleton);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .img-wrapper img.loaded { opacity: 1; }

        .info { min-width: 0; }

        .title {
            font-size: 0.9rem;
            font-weight: 600;
            margin: 0;
            height: 1.2em; /* Lock */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .artist {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 4px;
            height: 1.2em; /* Lock */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Skeleton Animation */
        .pulse {
            animation: pulse-bg 1.5s infinite ease-in-out;
            background-color: var(--skeleton);
        }

        @keyframes pulse-bg {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body>

<div class="container">
    <header><h1>Trending</h1></header>

    <div id="main-grid" class="album-grid">
        <div class="album-card"><div class="img-wrapper pulse"></div><div class="title pulse" style="width:80%"></div><div class="artist pulse" style="width:50%"></div></div>
        <div class="album-card"><div class="img-wrapper pulse"></div><div class="title pulse" style="width:80%"></div><div class="artist pulse" style="width:50%"></div></div>
        <div class="album-card"><div class="img-wrapper pulse"></div><div class="title pulse" style="width:80%"></div><div class="artist pulse" style="width:50%"></div></div>
        <div class="album-card"><div class="img-wrapper pulse"></div><div class="title pulse" style="width:80%"></div><div class="artist pulse" style="width:50%"></div></div>
        <div class="album-card"><div class="img-wrapper pulse"></div><div class="title pulse" style="width:80%"></div><div class="artist pulse" style="width:50%"></div></div>
    </div>
</div>

<script>
    const API = 'https://zedtopvibes.com/api/albums';
    const grid = document.getElementById('main-grid');

    async function load() {
        try {
            const res = await fetch(API);
            const data = await res.json();
            
            let html = '';
            data.forEach(item => {
                html += `
                <div class="album-card">
                    <div class="img-wrapper">
                        <img src="${item.cover_url}" 
                             onload="this.classList.add('loaded')" 
                             loading="lazy">
                    </div>
                    <div class="info">
                        <div class="title">${item.title}</div>
                        <div class="artist">${item.artist || 'Unknown'}</div>
                    </div>
                </div>`;
            });
            
            grid.innerHTML = html;
        } catch (e) { console.error(e); }
    }
    load();
</script>

</body>
</html>
