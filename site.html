<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Albums - No Layout Shift</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
            background: #0a0a0a;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Grid for smaller cards */
        .albums-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
            margin-top: 32px;
            min-height: 300px;
        }

        /* Skeleton card - matches real card dimensions */
        .skeleton-card {
            background: #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
            height: 220px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .skeleton-image {
            width: 100%;
            height: 160px;
            background: #2a2a2a;
        }

        .skeleton-text {
            padding: 8px 12px;
        }

        .skeleton-title {
            height: 14px;
            background: #2a2a2a;
            margin-bottom: 6px;
            border-radius: 3px;
        }

        .skeleton-artist {
            height: 12px;
            background: #2a2a2a;
            width: 70%;
            border-radius: 3px;
        }

        /* Real album card */
        .album-card {
            background: #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s;
            height: 220px;
            display: flex;
            flex-direction: column;
        }

        .album-card:hover {
            transform: translateY(-2px);
        }

        .album-cover {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background: #2a2a2a;
        }

        .album-info {
            padding: 8px 12px;
            flex: 1;
        }

        .album-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .album-artist {
            font-size: 11px;
            color: #999;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .album-meta {
            font-size: 10px;
            color: #666;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .error-message {
            background: #dc2626;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .stats {
            margin-top: 20px;
            padding: 12px;
            background: #1a1a1a;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Albums</h1>
        
        <div id="albums-container" class="albums-grid"></div>

        <div id="stats" class="stats" style="display: none;"></div>
    </div>

    <script>
        // Show exact number of skeletons
        function showSkeletons(count) {
            const container = document.getElementById('albums-container');
            container.innerHTML = Array(count).fill(`
                <div class="skeleton-card">
                    <div class="skeleton-image"></div>
                    <div class="skeleton-text">
                        <div class="skeleton-title"></div>
                        <div class="skeleton-artist"></div>
                    </div>
                </div>
            `).join('');
        }

        async function loadAlbums() {
            const container = document.getElementById('albums-container');
            const statsDiv = document.getElementById('stats');
            
            try {
                const response = await fetch('https://zedtopvibes.com/api/albums');
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const albums = await response.json();
                
                if (!albums.length) {
                    container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px;">No albums found</div>';
                    return;
                }
                
                // ✅ Show EXACT number of skeletons as albums
                showSkeletons(albums.length);
                
                // Small delay to ensure skeletons render, then replace with real content
                setTimeout(() => {
                    container.innerHTML = albums.map(album => `
                        <div class="album-card">
                            <img 
                                class="album-cover" 
                                src="${album.cover_url || ''}" 
                                alt="${escapeHtml(album.title)}"
                                loading="lazy"
                                onerror="this.style.background='#dc2626'"
                            >
                            <div class="album-info">
                                <div class="album-title" title="${escapeHtml(album.title)}">
                                    ${escapeHtml(album.title)}
                                </div>
                                <div class="album-artist" title="${escapeHtml(album.artist)}">
                                    ${escapeHtml(album.artist)}
                                </div>
                                <div class="album-meta">
                                    🎵 ${album.plays?.toLocaleString() || 0} plays
                                </div>
                            </div>
                        </div>
                    `).join('');
                    
                    // Show stats
                    statsDiv.style.display = 'block';
                    statsDiv.innerHTML = `✅ Loaded ${albums.length} album${albums.length !== 1 ? 's' : ''} | No layout shift`;
                    
                    console.log('Albums loaded:', albums.length);
                }, 50); // Small delay for smoother transition
                
            } catch (error) {
                console.error('Failed to load albums:', error);
                
                container.innerHTML = `
                    <div class="error-message" style="grid-column: 1/-1;">
                        ⚠️ Failed to load albums: ${error.message}<br>
                        <button onclick="location.reload()" style="margin-top: 10px; padding: 8px 16px; cursor: pointer; background: #fff; color: #000; border: none; border-radius: 4px;">Retry</button>
                    </div>
                `;
                statsDiv.style.display = 'none';
            }
        }
        
        // Escape HTML to prevent XSS
        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
        
        // Load albums when page loads
        loadAlbums();
    </script>
</body>
</html>
