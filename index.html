<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Inter', system-ui, -apple-system, Arial, sans-serif;
        background: #000;
        color: #fff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* Background */
    .bg {
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at 30% 50%, rgba(255,59,48,0.08), transparent 60%),
                    radial-gradient(circle at 80% 80%, rgba(0,255,200,0.06), transparent 60%);
        z-index: 0;
        pointer-events: none;
    }

    /* Container */
    .container {
        position: relative;
        z-index: 10;
        text-align: center;
        padding: 2rem;
        max-width: 400px;
        margin: 0 auto;
    }

    /* Logo */
    .logo {
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        opacity: 0.6;
        margin-bottom: 2rem;
        animation: fadeIn 0.6s ease forwards;
    }

    /* Message */
    .message {
        font-size: clamp(1.8rem, 5vw, 2.5rem);
        font-weight: 500;
        margin-bottom: 3rem;
        line-height: 1.2;
        animation: fadeIn 0.6s ease forwards;
        animation-delay: 0.1s;
    }

    .message span {
        font-weight: 700;
        background: linear-gradient(135deg, #fff, #00ffc8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    /* Social Links */
    .social-links {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 3rem;
        animation: fadeIn 0.6s ease forwards;
        animation-delay: 0.2s;
    }

    .social-link {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        max-width: 260px;
        padding: 0.9rem 1.5rem;
        border: 1px solid rgba(255,255,255,0.15);
        text-decoration: none;
        color: #fff;
        font-size: 0.9rem;
        transition: all 0.25s ease;
    }

    .social-link:hover {
        border-color: #00ffc8;
        transform: translate3d(5px,0,0);
    }

    .social-left {
        display: flex;
        align-items: center;
        gap: 0.75rem;
    }

    .social-icon {
        width: 18px;
        height: 18px;
        min-width: 18px;
        fill: currentColor;
    }

    .email-icon {
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
    }

    .social-arrow {
        opacity: 0.5;
    }

    /* Footer */
    .footer {
        padding-top: 1.5rem;
        border-top: 1px solid rgba(255,255,255,0.1);
        animation: fadeIn 0.6s ease forwards;
        animation-delay: 0.3s;
    }

    .footer-domain,
    .footer-tagline {
        font-size: 0.7rem;
        color: #888;
        text-transform: uppercase;
    }

    /* Animation */
    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translate3d(0, 10px, 0);
        }
        to {
            opacity: 1;
            transform: translate3d(0, 0, 0);
        }
    }

    /* Responsive */
    @media (max-width: 640px) {
        .container {
            padding: 1.5rem;
        }
    }
</style>
