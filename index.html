<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZedTopVibes</title>
    
    <meta name="description" content="ZedTopVibes - Coming Soon">
    <meta property="og:title" content="ZedTopVibes">
    <meta property="og:description" content="Coming Soon">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Minimal Background */
        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 50%, rgba(255,59,48,0.08) 0%, transparent 60%),
                        radial-gradient(circle at 80% 80%, rgba(0,255,200,0.06) 0%, transparent 60%);
            z-index: 0;
            pointer-events: none;
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
            max-width: 400px;
            margin: 0 auto;
        }

        /* Logo */
        .logo {
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #ffffff;
            margin-bottom: 2rem;
            opacity: 0.6;
        }

        /* Main Message */
        .message {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            font-weight: 500;
            letter-spacing: -0.02em;
            margin-bottom: 3rem;
            color: #ffffff;
            line-height: 1.2;
        }

        .message span {
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #00ffc8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Social Links */
        .social-links {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            width: 100%;
            margin-bottom: 3rem;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 260px;
            padding: 0.9rem 1.5rem;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-decoration: none;
            color: #ffffff;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .social-link:hover {
            border-color: #00ffc8;
            transform: translateX(5px);
        }

        .social-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .social-icon {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .email-icon {
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        .social-arrow {
            font-size: 1rem;
            opacity: 0.5;
            transition: opacity 0.3s ease;
        }

        .social-link:hover .social-arrow {
            opacity: 1;
        }

        /* Footer */
        .footer {
            position: relative;
            text-align: center;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .footer-domain {
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #888888;
            margin-bottom: 0.35rem;
        }

        .footer-tagline {
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #888888;
        }

        /* Fade In Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo, .message, .social-links, .footer {
            animation: fadeIn 0.6s ease forwards;
        }

        .message { animation-delay: 0.1s; opacity: 0; }
        .social-links { animation-delay: 0.2s; opacity: 0; }
        .footer { animation-delay: 0.3s; opacity: 0; }

        /* Mobile */
        @media (max-width: 640px) {
            .container {
                padding: 1.5rem;
            }
            
            .social-link {
                max-width: 280px;
                padding: 0.8rem 1.2rem;
            }
        }

        /* Desktop - Keep original sizing */
        @media (min-width: 1200px) {
            .social-link {
                max-width: 260px;
            }
        }

        /* For very short screens */
        @media (max-height: 650px) {
            .logo {
                margin-bottom: 1rem;
            }
            .message {
                margin-bottom: 1.5rem;
            }
            .social-links {
                margin-bottom: 1.5rem;
                gap: 0.5rem;
            }
            .social-link {
                padding: 0.6rem 1.5rem;
            }
            .footer {
                padding-top: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    
    <div class="container">
        <div class="logo">ZEDTOPVIBES</div>
        
        <div class="message">
            Follow <span>the Vibes</span>
        </div>
        
        <div class="social-links">
            <a href="https://youtube.com/@zedtopvibes" target="_blank" rel="noopener noreferrer" class="social-link">
                <div class="social-left">
                    <svg class="social-icon" viewBox="0 0 24 24">
                        <path d="M23.5 6.19a3.02 3.02 0 0 0-2.12-2.14C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.38.55A3.02 3.02 0 0 0 .5 6.19 31.5 31.5 0 0 0 0 12a31.5 31.5 0 0 0 .5 5.81 3.02 3.02 0 0 0 2.12 2.14c1.88.55 9.38.55 9.38.55s7.5 0 9.38-.55a3.02 3.02 0 0 0 2.12-2.14A31.5 31.5 0 0 0 24 12a31.5 31.5 0 0 0-.5-5.81zM9.55 15.5V8.5l6.27 3.5-6.27 3.5z"/>
                    </svg>
                    <span>YouTube</span>
                </div>
                <div class="social-arrow">→</div>
            </a>

            <a href="https://tiktok.com/@zedtopvibes" target="_blank" rel="noopener noreferrer" class="social-link">
                <div class="social-left">
                    <svg class="social-icon" viewBox="0 0 24 24">
                        <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z"/>
                    </svg>
                    <span>TikTok</span>
                </div>
                <div class="social-arrow">→</div>
            </a>

            <a href="mailto:hello@zedtopvibes.com" class="social-link">
                <div class="social-left">
                    <svg class="social-icon email-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="5" width="20" height="14" rx="2"/>
                        <polyline points="2,5 12,13 22,5"/>
                    </svg>
                    <span>Email</span>
                </div>
                <div class="social-arrow">→</div>
            </a>
        </div>

        <div class="footer">
            <div class="footer-domain">ZEDTOPVIBES.COM © <span id="currentYear"></span></div>
            <div class="footer-tagline">ALL VIBES RESERVED</div>
        </div>
    </div>

    <script>
        // Auto-updating year
        document.getElementById('currentYear').textContent = new Date().getFullYear();
    </script>
</body>
</html>
