            font-weight: 500;
        }
        
        .error-message i {
            font-size: 3rem;
            margin-bottom: 15px;
            color: rgba(255,100,100,0.5);
        }
        
        .no-results {
            padding: 40px;
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-style: italic;
        }
        
        .search-info {
            padding: 10px 18px;
            background: rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 0.9rem;
            color: rgba(255,255,255,0.8);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .clear-search {
            color: white;
            cursor: pointer;
            padding: 5px 12px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            font-size: 0.8rem;
            transition: all 0.2s ease;
            min-height: 44px;
            display: flex;
            align-items: center;
        }
        
        .clear-search:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .install-prompt {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 16px;
            display: none;
            align-items: center;
            gap: 16px;
            z-index: 2000;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            max-width: 400px;
            margin: 0 auto;
        }
        
        .install-prompt.show {
            display: flex;
        }
        
        .install-icon {
            width: 50px;
            height: 50px;
            background: #0b1018;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .install-text {
            flex: 1;
        }
        
        .install-text h4 {
            margin-bottom: 4px;
            font-weight: 600;
        }
        
        .install-text p {
            font-size: 0.8rem;
            opacity: 0.8;
        }
        
        .install-button {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 44px;
        }
        
        .install-button:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .close-install {
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            padding: 10px;
            margin: -10px;
        }
        
        @supports (padding: max(0px)) {
            .branding-bar {
                padding-left: max(20px, env(safe-area-inset-left));
                padding-right: max(20px, env(safe-area-inset-right));
            }
            
            .site-footer {
                padding-bottom: max(25px, env(safe-area-inset-bottom));
            }
            
            .nav-header {
                padding-top: max(20px, env(safe-area-inset-top));
            }
        }
        
        @media (max-width: 768px) {
            .main-content-container {
                flex-direction: column;
                padding: 10px 5px;
            }
            .left-sidebar .album-thumbnail {
                width: 100px;
                height: 100px;
            }
        }
        
        @media (max-width: 480px) {
            .album-thumbnail {
                width: 70px !important;
                height: 70px !important;
            }
        }
    </style>
</head>
<body>
    <div class="scroll-progress" id="scrollProgress"></div>
    
    <!-- App Install Prompt -->
    <div class="install-prompt" id="installPrompt">
        <div class="install-icon">🎬</div>
        <div class="install-text">
            <h4>Install Glass Route</h4>
            <p>Add to home screen for app-like experience</p>
        </div>
        <button class="install-button" id="installButton">Install</button>
        <span class="close-install" id="closeInstall">✕</span>
    </div>
    
    <div class="app-container">
        <header class="site-header">
            <!-- SOLID HEADER - NO FLASHY EFFECT -->
            <div class="branding-bar">
                <div class="hamburger-menu" id="hamburgerMenu">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                
                <div class="site-logo">GLASS•ROUTE</div>
                
                <div class="profile-icon" id="profileIcon">
                    <i class="fas fa-user"></i>
                </div>
            </div>
            
            <!-- Search section still has glass (looks good) -->
            <section class="search-section">
                <div class="search-container">
                    <div class="search-bar">
                        <input type="text" class="search-input" id="searchInput" placeholder="search movies, albums..." value="inception">
                        <button class="search-button" id="searchButton">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                </div>
            </section>
        </header>
        
        <div class="main-content-container" id="content">
            <aside class="left-sidebar">
                <div class="section-header">
                    <h2 class="section-title" id="mainSectionTitle">top 5 movies</h2>
                    <span class="view-all" id="refreshMain">↻</span>
                </div>
                
                <div class="search-info" id="searchInfo" style="display: none;">
                    <span id="searchQueryDisplay"></span>
                    <span class="clear-search" id="clearSearch">✕ clear</span>
                </div>
                
                <div class="latest-albums-list" id="latestAlbums">
                    <!-- Top 5 will be loaded here with number overlays -->
                </div>
                
                <div class="pagination-container" id="paginationContainer">
                    <div class="pagination" id="pagination"></div>
                </div>
            </aside>
            
            <div class="right-sidebar">
                <section class="section-block">
                    <div class="section-header">
                        <h2 class="section-title">top 5 music</h2>
                        <span class="view-all" id="refreshReleases">↻</span>
                    </div>
                    <div class="latest-albums-list" id="latestSongs"></div>
                </section>
                
                <section class="section-block">
                    <div class="section-header">
                        <h2 class="section-title">top artists</h2>
                        <span class="view-all" id="refreshArtists">↻</span>
                    </div>
                    <div class="latest-albums-list" id="featuredArtists"></div>
                </section>
                
                <section class="section-block">
                    <div class="section-header">
                        <h2 class="section-title">trending</h2>
                        <span class="view-all" id="refreshTrending">↻</span>
                    </div>
                    <div class="latest-albums-list" id="trendingAlbums"></div>
                </section>
            </div>
        </div>
        
        <footer class="site-footer">
            <p>© 2025 GLASS ROUTE · top 5 now</p>
            <p>movies • music • trending</p>
        </footer>
    </div>
    
    <div class="nav-drawer left" id="leftDrawer">
        <div class="nav-header">
            <div class="site-logo">GLASS•ROUTE</div>
            <div class="close-nav" id="closeLeftDrawer">✕</div>
        </div>
        <nav class="nav-menu">
            <a href="#" class="nav-item active" data-category="movie"><i class="fas fa-film"></i> Movies</a>
            <a href="#" class="nav-item" data-category="music"><i class="fas fa-compact-disc"></i> Music</a>
            <a href="#" class="nav-item" data-category="artist"><i class="fas fa-microphone-alt"></i> Artists</a>
        </nav>
    </div>
    
    <div class="nav-drawer right" id="rightDrawer">
        <div class="nav-header">
            <div class="site-logo">PROFILE</div>
            <div class="close-nav" id="closeRightDrawer">✕</div>
        </div>
        <nav class="nav-menu">
            <div class="nav-section-title">SETTINGS</div>
            <a href="#" class="nav-item"><i class="fas fa-cog"></i> Preferences</a>
            <a href="#" class="nav-item"><i class="fas fa-palette"></i> Theme</a>
        </nav>
    </div>

    <script>
        // PWA Installation
        let deferredPrompt;
        const installPrompt = document.getElementById('installPrompt');
        const installButton = document.getElementById('installButton');
        const closeInstall = document.getElementById('closeInstall');
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installPrompt.classList.add('show');
        });
        
        installButton.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            
            if (outcome === 'accepted') {
                console.log('App installed');
            }
            
            deferredPrompt = null;
            installPrompt.classList.remove('show');
        });
        
        closeInstall.addEventListener('click', () => {
            installPrompt.classList.remove('show');
        });
        
        window.addEventListener('appinstalled', () => {
            installPrompt.classList.remove('show');
            console.log('App was installed');
        });
        
        // API Configuration
        const API_BASE = 'https://itunes.apple.com';
        const CACHE_DURATION = 5 * 60 * 1000;
        
        // State management
        let currentState = {
            searchQuery: 'top',
            currentPage: 1,
            totalPages: 1,
            currentCategory: 'movie',
            isLoading: false,
            searchResults: []
        };
        
        let cache = new Map();
        
        // DOM Elements
        const elements = {
            latestAlbums: document.getElementById('latestAlbums'),
            latestSongs: document.getElementById('latestSongs'),
            featuredArtists: document.getElementById('featuredArtists'),
            trendingAlbums: document.getElementById('trendingAlbums'),
            searchInput: document.getElementById('searchInput'),
            searchButton: document.getElementById('searchButton'),
            searchInfo: document.getElementById('searchInfo'),
            searchQueryDisplay: document.getElementById('searchQueryDisplay'),
            clearSearch: document.getElementById('clearSearch'),
            mainSectionTitle: document.getElementById('mainSectionTitle'),
            paginationContainer: document.getElementById('paginationContainer'),
            pagination: document.getElementById('pagination')
        };
        
        // Utility Functions
        function showSkeletons(container, count = 5, isLarge = true) {
            if (!container) return;
            const width = isLarge ? '120px' : '80px';
            const height = isLarge ? '120px' : '80px';
            
            container.innerHTML = Array(count).fill(0).map(() => `
                <div class="album-item">
                    <div class="skeleton-thumbnail" style="width:${width};height:${height};"></div>
                    <div class="album-info">
                        <div class="skeleton-line short" style="width:60%"></div>
                        <div class="skeleton-line medium" style="width:80%"></div>
                        ${isLarge ? '<div class="skeleton-line long" style="width:100%"></div>' : ''}
                    </div>
                </div>
            `).join('');
        }
        
        function showError(container, message) {
            if (!container) return;
            container.innerHTML = `
                <div class="error-message">
                    <i class="fas fa-exclamation-circle"></i>
                    <p>${message}</p>
                </div>
            `;
        }
        
        function showNoResults(container) {
            if (!container) return;
            container.innerHTML = `
                <div class="no-results">
                    <i class="fas fa-search" style="font-size: 2rem; margin-bottom: 10px; opacity: 0.5;"></i>
                    <p>No results found</p>
                </div>
            `;
        }
        
        // Data Fetching with Cache
        async function fetchFromAPI(endpoint, params = {}) {
            const queryString = new URLSearchParams(params).toString();
            const url = `${API_BASE}${endpoint}${queryString ? '?' + queryString : ''}`;
            const cacheKey = url;
            
            if (cache.has(cacheKey)) {
                const { data, timestamp } = cache.get(cacheKey);
                if (Date.now() - timestamp < CACHE_DURATION) {
                    return data;
                }
            }
            
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                
                cache.set(cacheKey, { data, timestamp: Date.now() });
                return data;
            } catch (error) {
                console.error('API Error:', error);
                throw error;
            }
        }
        
        // Data Transformers
        function transformMovieToAlbum(item) {
            return {
                title: item.trackName || item.collectionName || 'Unknown Title',
                artist: item.artistName || 'Unknown Artist',
                year: item.releaseDate ? new Date(item.releaseDate).getFullYear() : '2024',
                genre: item.primaryGenreName || 'Various',
                artwork: item.artworkUrl100?.replace('100x100', '600x600') || null,
                trackCount: item.trackCount || 0
            };
        }
        
        function transformMusicToAlbum(item) {
            return {
                title: item.collectionName || item.trackName || 'Unknown Title',
                artist: item.artistName || 'Unknown Artist',
                year: item.releaseDate ? new Date(item.releaseDate).getFullYear() : '2024',
                genre: item.primaryGenreName || 'Various',
                artwork: item.artworkUrl100?.replace('100x100', '600x600') || null,
                trackCount: item.trackCount || 0
            };
        }
        
        // Render with Number Overlay
        function renderAlbumItemWithRank(item, rank, isLarge = true) {
            const thumbnailStyle = isLarge ? 'width:120px;height:120px;' : 'width:80px;height:80px;';
            const thumbnailContent = item.artwork 
                ? `<img src="${item.artwork}" alt="${item.title}" style="width:100%;height:100%;object-fit:cover;" loading="lazy">`
                : `<i class="fas fa-${isLarge ? 'film' : 'music'}" style="font-size:${isLarge ? '2.5rem' : '2rem'};"></i>`;
            
            return `
                <div class="album-item">
                    <div class="album-thumbnail" style="${thumbnailStyle}">
                        ${thumbnailContent}
                        <div class="number-overlay rank-${rank}">${rank}</div>
                    </div>
                    <div class="album-info">
                        <div class="album-title">
                            ${item.title}
                            ${rank === 1 ? '<span class="trending-badge"><i class="fas fa-crown"></i> #1</span>' : ''}
                        </div>
                        <div class="album-date">${item.year} • ${item.artist}</div>
                        <div class="album-meta">
                            <span class="album-genre">${item.genre}</span>
                            ${item.trackCount ? `<span class="album-tracks">${item.trackCount} tracks</span>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }
        
        // Load Top 5 for a section
        async function loadTop5(container, mediaType, isLarge = true, section = 'top') {
            if (!container) return;
            
            showSkeletons(container, 5, isLarge);
            
            try {
                // Search for popular items
                const data = await fetchFromAPI('/search', {
                    term: section === 'top' ? 'popular' : section,
                    media: mediaType,
                    limit: 20,
                    entity: mediaType === 'movie' ? 'movie' : 'album'
                });
                
                // Get random 5 from results to simulate top 5
                const results = (data.results || [])
                    .sort(() => 0.5 - Math.random())
                    .slice(0, 5)
                    .map(mediaType === 'movie' ? transformMovieToAlbum : transformMusicToAlbum);
                
                if (results.length === 0) {
                    showNoResults(container);
                } else {
                    // Render with rank numbers
                    container.innerHTML = results
                        .map((item, index) => renderAlbumItemWithRank(item, index + 1, isLarge))
                        .join('');
                }
                
            } catch (error) {
                console.error(`Error loading top 5:`, error);
                showError(container, `Failed to load top 5`);
            }
        }
        
        // Load all sections with top 5
        async function loadAllTop5() {
            await Promise.all([
                loadTop5(elements.latestAlbums, 'movie', true, 'top'),
                loadTop5(elements.latestSongs, 'music', false, 'top'),
                loadTop5(elements.featuredArtists, 'music', false, 'artist'),
                loadTop5(elements.trendingAlbums, 'music', false, 'trending')
            ]);
        }
        
        // Clear search
        function clearSearch() {
            elements.searchInfo.style.display = 'none';
            elements.searchInput.value = '';
            elements.mainSectionTitle.textContent = 'top 5 movies';
            loadAllTop5();
        }
        
        function initializeEventListeners() {
            // Search
            elements.searchButton.addEventListener('click', () => {
                if (elements.searchInput.value.trim()) {
                    elements.searchInfo.style.display = 'flex';
                    elements.searchQueryDisplay.textContent = `Searching: "${elements.searchInput.value}"`;
                    elements.mainSectionTitle.textContent = 'search results';
                    loadAllTop5();
                }
            });
            
            elements.searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    elements.searchButton.click();
                }
            });
            
            elements.clearSearch.addEventListener('click', clearSearch);
            
            // Refresh buttons
            document.getElementById('refreshMain').addEventListener('click', () => {
                loadTop5(elements.latestAlbums, 'movie', true, 'top');
            });
            
            document.getElementById('refreshReleases').addEventListener('click', () => {
                loadTop5(elements.latestSongs, 'music', false, 'top');
            });
            
            document.getElementById('refreshArtists').addEventListener('click', () => {
                loadTop5(elements.featuredArtists, 'music', false, 'artist');
            });
            
            document.getElementById('refreshTrending').addEventListener('click', () => {
                loadTop5(elements.trendingAlbums, 'music', false, 'trending');
            });
            
            // Navigation
            document.querySelectorAll('.nav-item[data-category]').forEach(item => {
                item.addEventListener('click', (e) => {
                    e.preventDefault();
                    document.querySelectorAll('.nav-item[data-category]').forEach(nav => {
                        nav.classList.remove('active');
                    });
                    e.target.classList.add('active');
                    
                    document.getElementById('leftDrawer').style.opacity = '0';
                    document.getElementById('leftDrawer').style.transform = 'translateX(-100%)';
                    setTimeout(() => {
                        document.getElementById('leftDrawer').style.display = 'none';
                    }, 300);
                });
            });
            
            // Drawers
            const hamburger = document.getElementById('hamburgerMenu');
            const leftDrawer = document.getElementById('leftDrawer');
            const closeLeft = document.getElementById('closeLeftDrawer');
            
            hamburger.addEventListener('click', () => {
                leftDrawer.style.display = 'block';
                setTimeout(() => {
                    leftDrawer.style.opacity = '1';
                    leftDrawer.style.transform = 'translateX(0)';
                }, 10);
            });
            
            closeLeft.addEventListener('click', () => {
                leftDrawer.style.opacity = '0';
                leftDrawer.style.transform = 'translateX(-100%)';
                setTimeout(() => {
                    leftDrawer.style.display = 'none';
                }, 300);
            });
            
            const profileIcon = document.getElementById('profileIcon');
            const rightDrawer = document.getElementById('rightDrawer');
            const closeRight = document.getElementById('closeRightDrawer');
            
            profileIcon.addEventListener('click', () => {
                rightDrawer.style.display = 'block';
                setTimeout(() => {
                    rightDrawer.style.opacity = '1';
                    rightDrawer.style.transform = 'translateX(0)';
                }, 10);
            });
            
            closeRight.addEventListener('click', () => {
                rightDrawer.style.opacity = '0';
                rightDrawer.style.transform = 'translateX(100%)';
                setTimeout(() => {
                    rightDrawer.style.display = 'none';
                }, 300);
            });
            
            // Scroll progress
            window.addEventListener('scroll', function() {
                const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
                const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                const scrolled = (winScroll / height) * 100;
                document.getElementById('scrollProgress').style.width = scrolled + '%';
            });
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            initializeEventListeners();
            await loadAllTop5();
        });
    </script>
</body>
</html>
