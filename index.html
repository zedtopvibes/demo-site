    <style>
        /* ===== SKELETON LOADER STYLES ===== */
        .skeleton-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        
        .skeleton-item {
            background: #fff;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: skeleton-pulse 1.2s ease-in-out infinite;
        }
        
        .skeleton-thumb {
            width: 80px;
            height: 80px;
            background: linear-gradient(90deg, #e0e0e0 25%, #f0f0f0 50%, #e0e0e0 75%);
            background-size: 200% 100%;
            border-radius: 8px;
            animation: skeleton-loading 1.5s infinite;
        }
        
        .skeleton-data {
            flex: 1;
        }
        
        .skeleton-title {
            height: 18px;
            width: 70%;
            background: linear-gradient(90deg, #e0e0e0 25%, #f0f0f0 50%, #e0e0e0 75%);
            background-size: 200% 100%;
            border-radius: 4px;
            margin-bottom: 8px;
            animation: skeleton-loading 1.5s infinite;
        }
        
        .skeleton-artist {
            height: 14px;
            width: 50%;
            background: linear-gradient(90deg, #e0e0e0 25%, #f0f0f0 50%, #e0e0e0 75%);
            background-size: 200% 100%;
            border-radius: 4px;
            margin-bottom: 8px;
            animation: skeleton-loading 1.5s infinite;
        }
        
        .skeleton-meta {
            height: 12px;
            width: 40%;
            background: linear-gradient(90deg, #e0e0e0 25%, #f0f0f0 50%, #e0e0e0 75%);
            background-size: 200% 100%;
            border-radius: 4px;
            animation: skeleton-loading 1.5s infinite;
        }
        
        @keyframes skeleton-loading {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }
        
        @keyframes skeleton-pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.8;
            }
        }
        
        /* Hide skeleton when content loads */
        .music-grid:not(.skeleton-mode) .skeleton-item {
            display: none;
        }
        
        .music-grid.skeleton-mode .skeleton-item {
            display: flex;
        }
        
        .music-grid.skeleton-mode > a:not(.skeleton-item) {
            display: none;
        }
    </style>
</head>
