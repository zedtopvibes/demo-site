<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zedtopvibes · All Artists</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="section-header">

    <div class="section-header section-spacing">
        <h2 class="section-title">Editor's Picks</h2>
    </div>
    <div class="corner">
        <div class="music-grid" id="editors-picks-container"></div>
    </div>

    <div class="section-header section-spacing">
        <h2 class="section-title">Recently Added</h2>
    </div>
    <div class="corner">
        <div class="music-grid" id="recently-added-container"></div>
    </div>

    <div class="section-header section-spacing">
        <h2 class="section-title">Popular Artists</h2>
    </div>
    <div class="corner">

    <script src="/js/main.js"></script>
