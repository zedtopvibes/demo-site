<header>
    <div class="header">
        <button class="hamburger-btn" id="hamburgerBtn" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
        <h1>
            <a href="/" class="logo" style="text-decoration: none; display: flex; align-items: center; gap: 0px;">
                <span style="font-size: 20px; font-weight: 800; color: #fff; letter-spacing: 1px;">ZEDT</span>
                <svg width="26" height="26" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align: middle;">
                    <!-- Outer circle border to look like "O" -->
                    <circle cx="15" cy="15" r="13" stroke="#ff4b2b" stroke-width="2.5" fill="none"/>
                    <!-- Music note inside -->
                    <path d="M15 7v9.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V11h3V7h-5z" fill="#ff4b2b"/>
                </svg>
                <span style="font-size: 20px; font-weight: 800; color: #fff; letter-spacing: 1px;">VIBES</span>
            </a>
        </h1>
    </div>
    <div class="search-section" style="position: relative;">
        <form id="searchForm" onsubmit="event.preventDefault(); searchMusic();">
            <input type="search" id="searchInput" class="forminput" placeholder="Search for music, artists, albums..." autocomplete="off" />
            <input type="submit" class="searchsubmit" value="Search" />
        </form>
        <div id="liveSearchResults"></div>
    </div>
</header>
<div class="clear"></div>
